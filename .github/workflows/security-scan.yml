name: security-scan

# Reusable org-wide security scan (gitleaks full-history + OSV-Scanner).
# Callers: jobs.scan.uses: cognitum-one/.github/.github/workflows/security-scan.yml@main
#
# NOTE: calling a reusable workflow across repos requires the org Actions policy
# to allow reusable workflows from cognitum-one/.github. Until that is enabled,
# repos use the SELF-CONTAINED equivalent in workflow-templates/security.yml.

on:
  workflow_call:
    inputs:
      gitleaks-version:
        type: string
        default: "8.30.1"

permissions:
  contents: read

jobs:
  secrets:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks (full history)
        run: |
          curl -fsSL https://raw.githubusercontent.com/cognitum-one/.github/main/gitleaks.toml -o .gitleaks.org.toml || true
          V="${{ inputs.gitleaks-version }}"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${V}/gitleaks_${V}_linux_x64.tar.gz" | tar -xzf - gitleaks
          CFG=""
          [ -f .gitleaks.toml ] && CFG="--config .gitleaks.toml"
          [ -z "$CFG" ] && [ -f .gitleaks.org.toml ] && CFG="--config .gitleaks.org.toml"
          ./gitleaks detect --source . $CFG --redact --exit-code 1

  deps:
    name: dependency scan (OSV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSV-Scanner
        run: |
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v2.2.4/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          set +e
          ./osv-scanner --recursive .
          code=$?
          set -e
          if [ "$code" = "128" ]; then echo "no supported manifests found; skipping"; exit 0; fi
          exit "$code"
