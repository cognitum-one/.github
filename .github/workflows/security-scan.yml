name: security-scan

# Reusable org-wide security scan. Callers:
#   jobs.scan.uses: cognitum-one/.github/.github/workflows/security-scan.yml@main
#
# Secrets are scanned in TWO modes (ADR-092):
#   secrets               — CURRENT files only (--no-git), BLOCKING on every
#                           push/PR. Respects inline `gitleaks:allow` and the
#                           org allowlist; no historical-fixture noise.
#   secrets-history-audit — FULL history, INFORMATIONAL, on the weekly schedule
#                           (and manual dispatch) only. Surfaces removed/rotated
#                           secrets as warnings; never blocks.
# OSV policy: fails only on High/Critical vulnerabilities that have a fix.

on:
  workflow_call:
    inputs:
      gitleaks-version:
        type: string
        default: "8.30.1"
      osv-version:
        type: string
        default: "2.2.4"

permissions:
  contents: read

jobs:
  secrets:
    name: secret scan (current files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks (current files, blocking)
        run: |
          # Only fetch the org config when no repo-local override exists — it
          # won't be used otherwise, and leaving it sitting in the working
          # tree makes it part of the --source . scan target: gitleaks then
          # flags the file's OWN key-shaped placeholder strings (the exact
          # patterns it lists to allow) as a false positive against itself.
          if [ ! -f .gitleaks.toml ]; then
            curl -fsSL https://raw.githubusercontent.com/cognitum-one/.github/main/gitleaks.toml -o .gitleaks.org.toml || true
          fi
          V="${{ inputs.gitleaks-version }}"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${V}/gitleaks_${V}_linux_x64.tar.gz" | tar -xzf - gitleaks
          CFG=""
          [ -f .gitleaks.toml ] && CFG="--config .gitleaks.toml"
          [ -z "$CFG" ] && [ -f .gitleaks.org.toml ] && CFG="--config .gitleaks.org.toml"
          # --no-git: scan the working tree (current files) only. Blocks new
          # secrets; ignores older commits (those are the history audit's job).
          ./gitleaks detect --source . --no-git $CFG --redact --exit-code 1

  secrets-history-audit:
    name: secret scan (full history audit)
    # Informational: weekly schedule + manual runs only. Never blocks push/PR.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks (full history, informational)
        run: |
          # See the "current files" job above for why this is conditional.
          if [ ! -f .gitleaks.toml ]; then
            curl -fsSL https://raw.githubusercontent.com/cognitum-one/.github/main/gitleaks.toml -o .gitleaks.org.toml || true
          fi
          V="${{ inputs.gitleaks-version }}"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${V}/gitleaks_${V}_linux_x64.tar.gz" | tar -xzf - gitleaks
          CFG=""
          [ -f .gitleaks.toml ] && CFG="--config .gitleaks.toml"
          [ -z "$CFG" ] && [ -f .gitleaks.org.toml ] && CFG="--config .gitleaks.org.toml"
          # Never fail the workflow — this is an audit, not a gate.
          ./gitleaks detect --source . $CFG --redact --report-format json --report-path history.json --exit-code 0 || true
          n=$(python3 -c "import json;print(len(json.load(open('history.json'))))" 2>/dev/null || echo 0)
          if [ "$n" -gt 0 ]; then
            echo "::warning::Full-history audit found $n secret finding(s) in git history — review (not blocking; may be removed/rotated secrets)."
            {
              echo "## 🔎 Full-history secret audit — $n finding(s)"
              echo "These are in git *history* (removed/rotated or historical fixtures). Rotate anything real; allowlist confirmed non-secrets in gitleaks.toml."
              echo ""
              python3 -c "import json;[print('- \`'+x.get('RuleID','?')+'\` '+x.get('File','?')+':'+str(x.get('StartLine','?'))+' @ '+x.get('Commit','')[:8]) for x in json.load(open('history.json'))[:50]]" 2>/dev/null || true
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Full-history audit: clean."
          fi

  deps:
    name: dependency scan (OSV, fail on High+ fixable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSV-Scanner
        run: |
          V="${{ inputs.osv-version }}"
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${V}/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          # Human-readable table in the log (never fails the step here)
          ./osv-scanner --recursive . || true
          # Machine-readable for the gate
          ./osv-scanner --recursive --format json . > osv.json 2>/dev/null || true
          if [ ! -s osv.json ]; then echo "no OSV results (no manifests?)"; exit 0; fi
          # Gate: fail ONLY on High/Critical (CVSS>=7) vulns that have a fix version.
          python3 -c '
          import json,sys
          try: d=json.load(open("osv.json"))
          except Exception: sys.exit(0)
          bad=[]
          for res in d.get("results",[]):
           for p in res.get("packages",[]):
            sev={}
            for g in p.get("groups",[]):
             for i in g.get("ids",[]): sev[i]=g.get("max_severity","") or "0"
            for v in p.get("vulnerabilities",[]):
             fx=any("fixed" in e for a in v.get("affected",[]) for r in a.get("ranges",[]) for e in r.get("events",[]))
             try: s=float(sev.get(v["id"],"0") or 0)
             except Exception: s=0.0
             if fx and s>=7.0: bad.append((p["package"]["name"],p["package"]["version"],v["id"],s))
          if bad:
           print("::error::%d High/Critical vulnerabilities WITH fixes available:"%len(bad))
           for n,ver,i,s in sorted(bad,key=lambda x:-x[3]): print("  CVSS %.1f  %s@%s  %s"%(s,n,ver,i))
           sys.exit(1)
          print("OK: no High/Critical fixable vulnerabilities. (Lower-severity / unfixable advisories above are informational.)")
          '
