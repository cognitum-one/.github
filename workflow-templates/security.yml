name: security

# Org security scan for this repo — calls the shared reusable workflow.
# Add via GitHub UI: Actions -> New workflow -> "Security scan (cognitum-one)".

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — weekly drift sweep
jobs:
  scan:
    uses: cognitum-one/.github/.github/workflows/security-scan.yml@main
